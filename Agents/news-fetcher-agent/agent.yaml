# Schemas/Agent.md 스키마를 따름

id: news-fetcher-agent
name: News Fetcher Agent
version: 1.0.0
status: active

role: >
  영어권 주요 뉴스 매체에서 한국 주식 시장에 영향을 줄 수 있는
  핫 토픽 10개를 수집하여 정형화된 목록으로 반환한다.

capabilities: []

inputs:
  - name: date
    type: text
    required: false
    description: 수집 기준 날짜 (YYYY-MM-DD). 없으면 오늘 날짜 사용.

outputs:
  - name: news_topics
    type: yaml
    path: null
    description: >
      한국 주식 영향 뉴스 10개 목록.
      각 항목: title, source, summary, affected_sectors, relevance_reason

dependencies:
  agents: []
  tools: []
  # 현재: AI 내장 웹 검색으로 동작 (별도 툴 불필요)
  # 자동화 파이프라인 전환 시: NewsAPI 또는 Tavily 툴 등록 예정

prompt_path: Agents/news-fetcher-agent/prompt.md

constraints:
  - 반드시 영어권 매체 기준으로 수집한다 (Reuters, Bloomberg, WSJ, FT, CNBC 우선).
  - 한국 주식 시장과 직간접 관련이 없는 토픽은 제외한다.
  - 출처(source)를 반드시 포함한다.
  - 중복 토픽은 하나로 합친다.

tags:
  - news
  - research
  - stock-market
  - korean-market

changelog:
  - version: 1.0.0
    date: 2026-07-09
    note: 최초 등록 (테스트용)
