id: content-translator
name: 영문 콘텐츠 한국어 번역기
version: 1.0.0
schema_version: 1.0
created_at: 2026-07-09

description: >
  사용자가 제공한 영문 콘텐츠(문서, 이메일, 기사 등)를
  한국어로 자동 번역하는 단순 번역 프로젝트입니다.

# 프로젝트가 의존하는 AOA 에이전트
dependencies:
  agents:
    - id: translation-agent
      path: Agents/translation-agent/
      type: shared
      description: 영문을 한국어로 번역

# 실행할 워크플로우
workflows:
  - id: simple-translation-workflow
    path: Workflows/simple-translation-workflow.yaml
    description: >
      영문 입력 → 번역 → 한국어 출력 (2단계 워크플로우)

# 프로젝트 출력물 저장 경로
outputs:
  directory: Projects/content-translator/Outputs/
  format: markdown

# 프로젝트 메모리 저장 경로
memory:
  directory: Projects/content-translator/Memory/

# 프로젝트 템플릿
templates:
  - id: translation-output-template
    path: Projects/content-translator/Templates/translation-output-template.md

# 프로젝트 태그
tags:
  - automation
  - translation
  - simple
  - utility
