id: simple-translation-workflow
name: 단순 번역 워크플로우
version: 1.0.0
status: active

description: >
  영문 콘텐츠를 입력받아 한국어로 번역하는 
  2단계 단순 워크플로우

pattern: pipeline

agents_required:
  - id: translation-agent
    role: 영문 → 한국어 번역
    type: shared
  - id: content-translator-project-agent
    role: 최종 파일 생성
    type: project_agent

inputs:
  - name: source_file
    type: file_path
    description: 번역할 영문 파일 경로 (txt, md)
    required: true
  - name: output_filename
    type: string
    description: 출력 파일명
    required: false
    default: translated-{timestamp}.md

outputs:
  - name: translated_content
    path: Outputs/{output_filename}
    format: markdown

steps:
  - step_id: step-001
    name: 영문 콘텐츠 번역
    agent: translation-agent
    execution: create_shared_agent
    inputs_from:
      - source: workflow_input
        field: source_file
    outputs_to:
      - target: Memory/step-001-translated.yaml
        format: yaml
    on_failure: escalate

  - step_id: step-002
    name: 번역 결과 파일 생성
    agent: content-translator-project-agent
    execution: local
    inputs_from:
      - source: step-001
        field: Memory/step-001-translated.yaml
    outputs_to:
      - target: Outputs/{output_filename}
        format: markdown
    on_failure: escalate

post_execution:
  - action: notify
    target: user
    message: "번역 완료: {output_filename}"

changelog:
  - version: 1.0.0
    date: 2026-07-09
    note: 최초 등록 - translation-agent만 사용하는 단순 워크플로우
