# Health Fitness Cards Project Manifest

# ── 기본 정보 ──────────────────────────────────────────
id: health-fitness-cards
name: Health Fitness Cards
version: 1.0.0
status: active

description: >
  건강 및 여성 운동 트렌드를 Instagram Reels에서 수집하여
  정보성 카드뉴스 이미지를 자동 생성하는 테스트 프로젝트.
  일러스트/다이어그램 스타일, 실사 이미지 제외.
  트렌드 → 이미지 생성 → 결과 저장 워크플로우 검증용.

created_at: 2026-07-10T15:54:00+09:00
updated_at: 2026-07-15T17:02:00+09:00

# ── 🚨 작업 시작 전 필수 절차 ────────────────────────────
# 모든 프로젝트 세션 시작 시 다음을 수행하세요:
# 1. Wiki 조회 (필수)
#    ./pre_execution_check.sh
# 2. 체크리스트 검증
#    - [ ] Wiki 전체 읽음
#    - [ ] 과거 실수 패턴 확인
#    - [ ] 회피 전략 적용
# 3. 작업 시작
# ❌ Wiki 조회 없이 작업 시작 금지!

# ── 디렉터리 구조 ──────────────────────────────────────
paths:
  root: Projects/health-fitness-cards/
  agents: Projects/health-fitness-cards/Agents/
  workflows: Projects/health-fitness-cards/Workflows/
  memory: Projects/health-fitness-cards/Memory/
  outputs: Projects/health-fitness-cards/Outputs/

# ── 의존성 선언 ────────────────────────────────────────
dependencies:
  agents:
    - id: account-content-collector
      path: Agents/account-content-collector/
      role: 검증된 Instagram 계정의 최신 포스트 직접 수집 (정보성 카드뉴스 일러스트만)
      override: null
      # 파라미터로 제어:
      # - target_accounts: ["@health__happyvirus", ...] (verified_accounts.json 사용)
      # - posts_per_account: 10
      # - date_range_days: 7
      # - 일러스트 기반 의학/건강 정보 카드만 수집 (실사 제외)
      # - 중복 이미지 제거

    - id: content-transformer
      path: Registry/Agents/content-transformer/
      role: 수집된 콘텐츠 분석 및 맥락 보존 변형 (image_edit 프롬프트 자동 생성)
      override: null
      # 파라미터로 제어:
      # - transformation_mode: "context_preserving"
      # - variation_level: "low" (최소 변경)
      # - 맥락(주제, 형식, 스타일) 유지, 세부 내용만 변형

    - id: image-generator
      path: Registry/Agents/image-generator/
      role: 변형된 콘텐츠 기반 카드 뉴스 이미지 생성 (image_edit, 9:16 세로형)
      override: null
      # 파라미터로 제어:
      # - mode: "image_edit"
      # - aspect_ratio: "9:16"
      # - strength: 0.25
      # - model: "nano-banana-2/edit"
      # - apply_watermark_crop: true

  tools: []

  project_agents: []

# ── 워크플로우 ────────────────────────────────────────
workflows:
  default: Projects/health-fitness-cards/Workflows/main.md
  available:
    - id: trend-to-cards
      path: Projects/health-fitness-cards/Workflows/main.md
      description: 트렌드 수집 → 이미지 생성 → 결과 저장

# ── 메모리 설정 ───────────────────────────────────────
memory:
  project_memory: Projects/health-fitness-cards/Memory/project.md
  execution_state: Projects/health-fitness-cards/Memory/execution_state.md
  decision_log: Projects/health-fitness-cards/Memory/decision_log.md

# ── 출력 설정 ─────────────────────────────────────────
outputs:
  default_path: Projects/health-fitness-cards/Outputs/
  format: mixed  # 이미지 + JSON 메타데이터

# ── 태그 및 분류 ──────────────────────────────────────
tags: [health, fitness, women-workout, card-news, automation, test]
category: automation
