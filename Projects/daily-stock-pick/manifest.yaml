# Schemas/Project.md 스키마를 따름

id: daily-stock-pick
name: 해외 뉴스 기반 오늘의 추천 주
version: 1.0.0
status: active

description: >
  영어권 해외 뉴스에서 한국 주식 시장에 영향을 줄 수 있는 핫 토픽을 수집·번역하고,
  관련 한국 주식 추천 종목을 도출하여 일일 보고서로 출력한다.

created_at: 2026-07-09
updated_at: 2026-07-09

paths:
  root: Projects/daily-stock-pick/
  agents: Projects/daily-stock-pick/Agents/
  workflows: Projects/daily-stock-pick/Workflows/
  memory: Projects/daily-stock-pick/Memory/
  outputs: Projects/daily-stock-pick/Outputs/

dependencies:
  agents:
    - id: news-fetcher-agent
      path: Agents/news-fetcher-agent/
      role: 영어권 뉴스에서 한국 주식 영향 토픽 10개 수집
      override: null

    - id: translation-agent
      path: Agents/translation-agent/
      role: 수집된 뉴스를 보고서용 한국어로 번역
      override: null

  tools: []

  project_agents:
    - id: stock-recommendation-agent
      path: Projects/daily-stock-pick/Agents/stock-recommendation-agent/
      role: 번역된 뉴스 기반으로 긍정적 영향을 받는 한국 주식 추천 종목 도출

workflows:
  default: Projects/daily-stock-pick/Workflows/news-to-stock-workflow.yaml
  available:
    - id: news-to-stock-workflow
      path: Projects/daily-stock-pick/Workflows/news-to-stock-workflow.yaml
      description: 뉴스 수집 → 번역 → 주식 추천 → 최종 보고서 생성

memory:
  project_memory: Projects/daily-stock-pick/Memory/project.md
  execution_state: Projects/daily-stock-pick/Memory/execution_state.md
  decision_log: Projects/daily-stock-pick/Memory/decision_log.md

outputs:
  default_path: Projects/daily-stock-pick/Outputs/
  format: markdown

tags: [news, stock, korean-market, daily-report]
category: automation
