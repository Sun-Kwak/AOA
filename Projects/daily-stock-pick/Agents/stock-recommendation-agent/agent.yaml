id: stock-recommendation-agent
name: Stock Recommendation Agent
version: 1.0.0
status: active

role: >
  번역된 해외 뉴스를 분석하여 긍정적 영향을 받을 것으로 판단되는
  한국 상장 주식을 추천 근거와 함께 도출한다.

capabilities: []

inputs:
  - name: translated_news
    type: yaml
    required: true
    description: translation-agent가 반환한 번역된 뉴스 목록

outputs:
  - name: recommendations
    type: yaml
    path: null
    description: >
      추천 종목 목록.
      각 항목: stock_name, ticker, reason, related_news_rank, confidence

dependencies:
  agents: []
  tools: []

prompt_path: Projects/daily-stock-pick/Agents/stock-recommendation-agent/prompt.md

constraints:
  - 긍정적 영향(상승 기대)이 있는 종목만 포함한다. 부정적 종목은 제외.
  - 한국 거래소(KOSPI, KOSDAQ) 상장 종목만 추천한다.
  - 추천 근거는 반드시 번역된 뉴스 항목과 연결해야 한다.
  - 투자 권유가 아님을 명시한다.
  - 최대 10종목 이내로 제한한다.

tags: [stock, korean-market, recommendation, research]

changelog:
  - version: 1.0.0
    date: 2026-07-09
    note: 최초 등록 (프로젝트 전용)
