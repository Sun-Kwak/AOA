# Schemas/Workflow.md 스키마를 따름

id: news-to-stock-workflow
name: 뉴스 수집 → 번역 → 주식 추천 → 보고서 워크플로우
version: 1.3.0
status: active

description: >
  해외 뉴스 수집부터 한국 주식 추천 보고서 생성까지
  4단계를 순차 실행하는 파이프라인 워크플로우.
  프로젝트가 공용 에이전트 세션을 직접 생성하여 사용.

pattern: pipeline

agents_required:
  - id: news-fetcher-agent
    role: 뉴스 수집
    type: shared
  - id: translation-agent
    role: 번역
    type: shared
  - id: stock-recommendation-agent
    role: 주식 추천 도출
    type: sub_agent
  - id: daily-stock-pick-project-agent
    role: 최종 보고서 생성
    type: project_agent

inputs:
  - name: date
    type: text
    required: false
    description: 보고서 기준 날짜 (YYYY-MM-DD). 없으면 오늘.

outputs:
  - name: daily_report
    type: file_path
    description: Projects/daily-stock-pick/Outputs/daily-report-<date>.md

steps:
  - step_id: step-001
    name: 뉴스 수집
    agent: news-fetcher-agent
    execution: create_shared_agent
    inputs_from:
      - source: workflow_input
        field: date
    outputs_to:
      - target: step-002
        field: raw_news
    on_failure: escalate

  - step_id: step-002
    name: 뉴스 번역
    agent: translation-agent
    execution: create_shared_agent
    inputs_from:
      - source: step-001
        field: raw_news
    outputs_to:
      - target: step-003
        field: translated_news
    on_failure: escalate

  - step_id: step-003
    name: 한국 주식 추천 도출
    agent: stock-recommendation-agent
    execution: create_sub_agent
    inputs_from:
      - source: step-002
        field: translated_news
    outputs_to:
      - target: step-004
        field: recommendations
    on_failure: escalate

  - step_id: step-004
    name: 최종 보고서 생성
    agent: daily-stock-pick-project-agent
    execution: local
    inputs_from:
      - source: step-001
        field: raw_news
      - source: step-002
        field: translated_news
      - source: step-003
        field: recommendations
      - source: workflow_input
        field: date
    outputs_to:
      - target: workflow_output
        field: daily_report
    on_failure: escalate

hitl_points:
  - after_step: step-004
    reason: 최종 보고서 사용자 검토 후 저장 확정

tags: [news, stock, pipeline, daily]

changelog:
  - version: 1.3.0
    date: 2026-07-09
    note: Hub 방식 제거, 프로젝트가 공용 에이전트 세션 직접 생성 (execution: create_shared_agent)
  - version: 1.2.0
    date: 2026-07-09
    note: Hub 라우팅 방식 적용 (execution: route_via_hub)
  - version: 1.1.0
    date: 2026-07-09
    note: 세션 ID 명시 추가 (공용 에이전트 재사용)
  - version: 1.0.0
    date: 2026-07-09
    note: 최초 등록
